name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  commitlint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # DIVERGENCE 3: Advisory mode -- gates report but do not block merges during Epic 1.
    # TODO(Epic 2): Remove continue-on-error to harden gates to blocking.
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false
          # DIVERGENCE 1: NO submodules here -- commitlint only needs commit history

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install commitlint dependencies
        env:
          HUSKY: 0
        run: npm ci

      - name: Validate PR title
        if: github.event_name == 'pull_request'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: echo "$PR_TITLE" | npx commitlint

      - name: Validate PR commits
        if: github.event_name == 'pull_request'
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

      - name: Validate latest main commit
        if: github.event_name == 'push'
        run: npx commitlint --last --verbose

  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # DIVERGENCE 1: FrontComposer has root-declared references submodules.
          # fetch-depth: 1 (shallow) keeps checkout fast while avoiding nested recursion.
          fetch-depth: 1
          persist-credentials: false
          submodules: true

      - name: Record full CI lane start
        shell: bash
        run: echo "FC_FULL_CI_STARTED_AT=$(date -u +%s)" >> "$GITHUB_ENV"

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '10.0.300'

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Validate npm lockfile
        env:
          HUSKY: 0
        run: npm ci

      - name: Cache NuGet packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('Directory.Packages.props') }}
          restore-keys: nuget-

      # Gate 1: Contracts builds in isolation targeting netstandard2.0
      - name: 'Gate 1: Contracts Build (netstandard2.0)'
        run: |
          dotnet restore Hexalith.FrontComposer.slnx
          dotnet build src/Hexalith.FrontComposer.Contracts/Hexalith.FrontComposer.Contracts.csproj -f netstandard2.0 --configuration Release --no-restore

      # Gate 2: Full solution builds
      - name: 'Gate 2: Solution Build'
        run: dotnet build Hexalith.FrontComposer.slnx --configuration Release --no-restore

      # Gate 2a: CLI tool packaging and local-tool smoke
      - name: 'Gate 2a: CLI Tool Package Smoke'
        shell: bash
        run: |
          dotnet pack src/Hexalith.FrontComposer.Cli/Hexalith.FrontComposer.Cli.csproj --configuration Release --no-build --output ./nupkgs -p:PackageVersion=0.0.0-ci

          tool_home="$(mktemp -d)"
          fixture="$(mktemp -d)"

          dotnet new tool-manifest --force --output "$tool_home"
          (
            cd "$tool_home"
            dotnet tool install Hexalith.FrontComposer.Cli --add-source "$GITHUB_WORKSPACE/nupkgs" --version 0.0.0-ci --ignore-failed-sources
          )

          mkdir -p "$fixture/Acme.App/obj/Debug/net10.0/generated/HexalithFrontComposer"
          cat > "$fixture/Acme.App/Acme.App.csproj" <<'EOF'
          <Project Sdk="Microsoft.NET.Sdk">
            <PropertyGroup>
              <TargetFramework>net10.0</TargetFramework>
            </PropertyGroup>
          </Project>
          EOF
          cat > "$fixture/Acme.App/Program.cs" <<'EOF'
          services.AddFrontComposerDebugOverlay();
          EOF
          cat > "$fixture/Acme.App/obj/Debug/net10.0/generated/HexalithFrontComposer/Acme.Shipping.ShipmentProjection.g.razor.cs" <<'EOF'
          namespace Acme.Shipping { }
          EOF

          (
            cd "$tool_home"
            dotnet tool run frontcomposer --help
            dotnet tool run frontcomposer inspect --project "$fixture/Acme.App/Acme.App.csproj" --configuration Debug --framework net10.0 --format json
            dotnet tool run frontcomposer migrate --project "$fixture/Acme.App/Acme.App.csproj" --from 9.1.0 --to 9.2.0 --dry-run --format json
            dotnet tool run frontcomposer migrate --project "$fixture/Acme.App/Acme.App.csproj" --from 9.1.0 --to 9.2.0 --apply --format json
          )

      # Gate 2b: Infrastructure governance and telemetry contracts
      - name: 'Gate 2b: Infrastructure governance and telemetry contracts'
        env:
          DiffEngine_Disabled: true
        run: dotnet test Hexalith.FrontComposer.slnx --configuration Release --no-build --filter "Category=Governance" --results-directory ./TestResults --logger "trx;LogFileName=test-results-governance.trx"

      # Gate 2c: File-based consumer pacts for the FrontComposer/EventStore REST boundary.
      # This lane intentionally uses the existing root-declared `submodules: true` checkout above and
      # does not run recursive nested submodule initialization.
      - name: 'Gate 2c: Contract pacts'
        env:
          DiffEngine_Disabled: true
        run: dotnet test tests/Hexalith.FrontComposer.Shell.Tests/Hexalith.FrontComposer.Shell.Tests.csproj --configuration Release --no-build --filter "Category=Contract" --results-directory ./TestResults --logger "trx;LogFileName=test-results-contract.trx"

      - name: 'Gate 2c: Validate contract artifacts'
        shell: pwsh
        run: |
          $requireProvider = '${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}' -eq 'true'
          ./eng/validate-contract-artifacts.ps1 -RequireProviderVerification:$requireProvider

      - name: 'Gate 2c: Fail on stale pact diff'
        shell: bash
        run: |
          mkdir -p artifacts/contracts
          if git diff --exit-code -- tests/Hexalith.FrontComposer.Shell.Tests/Pact; then
            echo "No stale pact diff detected." > artifacts/contracts/stale-pact-check.txt
          else
            echo "Stale pact diff detected; regenerate and commit intentional contract changes." > artifacts/contracts/stale-pact-check.txt
            exit 1
          fi

      - name: Contract Summary
        if: always()
        shell: bash
        run: |
          if [ -f artifacts/contracts/job-summary.md ]; then
            cat artifacts/contracts/job-summary.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload contract artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: contract-artifacts
          retention-days: 14
          if-no-files-found: error
          path: |
            artifacts/contracts/**
            tests/Hexalith.FrontComposer.Shell.Tests/Pact/*.json
            tests/Hexalith.FrontComposer.Shell.Tests/Pact/provider-verification-handoff.md

      # Gate 2c: DocFX documentation publication and validation
      - name: 'Gate 2d: Docs Validation'
        shell: pwsh
        run: |
          dotnet tool restore
          ./eng/validate-docs.ps1

      # Gate 3: All tests pass
      # DIVERGENCE 4: Solution-level testing -- FrontComposer runs a single `dotnet test` on the
      # whole solution (all tests are Tier 1, no DAPR/Aspire tiers). EventStore runs 12 separate
      # per-project test commands because it has DAPR-dependent tiers.
      #
      # Story 3-7 D6: Gate 3 is split into three lanes so Story 3-4 closure can gate on
      # `e2e-palette` independently of latency/perf variance:
      #   - Gate 3a (default):   excludes Performance, e2e-palette, NightlyProperty, and Quarantined traits.
      #   - Gate 3b (palette):   `Category=e2e-palette` (Story 3-7 T1 — bUnit-level flow gate).
      #   - Gate 3c (perf bench): `Category=Performance` (Story 1-8 + Story 3-7 T2 BDN bench).
      # Palette/performance lanes remain advisory while Story 3-7 stabilizes browser and latency
      # variance; governance and default unit/bUnit lanes above are blocking.
      - name: 'Gate 3a: Unit + bUnit (default lane)'
        env:
          # DIVERGENCE 2: FrontComposer has 16+ Verify .verified.txt snapshot files.
          # Without this env var, a snapshot mismatch launches a diff tool and hangs the CI runner.
          DiffEngine_Disabled: true
        run: dotnet test Hexalith.FrontComposer.slnx --configuration Release --no-build --filter "Category!=Performance&Category!=e2e-palette&Category!=NightlyProperty&Category!=Quarantined" --results-directory ./TestResults --logger "trx;LogFileName=test-results.trx" --collect:"XPlat Code Coverage"

      - name: 'Gate 3b: Palette E2E (e2e-palette lane)'
        continue-on-error: true
        env:
          DiffEngine_Disabled: true
        run: dotnet test Hexalith.FrontComposer.slnx --configuration Release --no-build --filter "Category=e2e-palette" --results-directory ./TestResults --logger "trx;LogFileName=test-results-e2e-palette.trx"

      - name: 'Gate 3c: Performance bench (Performance lane)'
        continue-on-error: true
        env:
          DiffEngine_Disabled: true
        run: dotnet test Hexalith.FrontComposer.slnx --configuration Release --no-build --filter "Category=Performance" --results-directory ./TestResults --logger "trx;LogFileName=test-results-performance.trx"

      - name: 'Gate 3d: Quarantined tests (warning-only)'
        continue-on-error: true
        env:
          DiffEngine_Disabled: true
        run: dotnet test Hexalith.FrontComposer.slnx --configuration Release --no-build --filter "Category=Quarantined" --results-directory ./TestResults --logger "trx;LogFilePrefix=test-results-quarantine"

      - name: Quarantine Summary
        if: always()
        run: |
          python3 .github/scripts/ci_governance.py summarize-quarantine \
            --results-dir ./TestResults \
            --markdown artifacts/quarantine/quarantine-summary.md \
            --json artifacts/quarantine/quarantine-summary.json \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Upload quarantine artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: quarantine-artifacts
          retention-days: 14
          if-no-files-found: error
          path: |
            artifacts/quarantine/**
            TestResults/**/test-results-quarantine*.trx

      # Guard: fail fast if no tests ran (--no-build silently exits 0 with 0 tests).
      # Uses find + grep to handle both flat and per-project-GUID subdirectory layouts.
      - name: Verify tests actually ran
        run: find ./TestResults -name 'test-results.trx' -type f | grep -q .

      - name: Test Summary
        if: always()
        run: |
          python3 - <<'PY'
          import glob
          import os
          import xml.etree.ElementTree as ET

          summary_path = os.environ['GITHUB_STEP_SUMMARY']

          def pick_latest(glob_pattern):
            matches = glob.glob(glob_pattern, recursive=True)
            if not matches:
              return None
            return max(matches, key=os.path.getmtime)

          def parse_trx(path):
            root = ET.parse(path).getroot()
            counters = root.find('.//{*}ResultSummary/{*}Counters')
            if counters is not None:
              total = int(counters.attrib.get('total', '0'))
              passed = int(counters.attrib.get('passed', '0'))
              failed = int(counters.attrib.get('failed', '0'))
              return passed, failed, total
            results = root.findall('.//{*}UnitTestResult')
            total = len(results)
            passed = sum(1 for r in results if r.attrib.get('outcome') == 'Passed')
            failed = sum(1 for r in results if r.attrib.get('outcome') == 'Failed')
            return passed, failed, total

          with open(summary_path, 'a', encoding='utf-8') as summary:
            summary.write('## CI Test Results\n')

            trx = pick_latest('./TestResults/**/test-results.trx')
            if trx is None:
              summary.write('No TRX file found.\n')
            else:
              try:
                passed, failed, total = parse_trx(trx)
                summary.write(f'**All Tests:** {passed} passed, {failed} failed (total: {total})\n\n')
              except ET.ParseError as e:
                summary.write(f'**Warning:** Could not parse TRX file `{trx}` (likely truncated): {e}\n\n')
              except Exception as e:
                summary.write(f'**Warning:** Unexpected error reading TRX file `{trx}`: {e}\n\n')

            summary.write('### Job Status\n')
            summary.write('${{ job.status }}\n')
          PY

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: test-results
          path: '**/test-results.trx'

      - name: Coverage Summary
        if: always()
        run: |
          python3 - <<'PY'
          import glob
          import os
          import xml.etree.ElementTree as ET

          summary_path = os.environ['GITHUB_STEP_SUMMARY']
          coverage_files = glob.glob('**/coverage.cobertura.xml', recursive=True)

          if not coverage_files:
            with open(summary_path, 'a', encoding='utf-8') as f:
              f.write('\n### Code Coverage\nNo coverage files found.\n')
            exit(0)

          total_lines = 0
          covered_lines = 0
          total_branches = 0
          covered_branches = 0
          per_project = []

          for cov_file in coverage_files:
            try:
              tree = ET.parse(cov_file)
              root = tree.getroot()
              line_rate = float(root.attrib.get('line-rate', '0'))
              branch_rate = float(root.attrib.get('branch-rate', '0'))
              lines_valid = int(root.attrib.get('lines-valid', '0'))
              lines_covered = int(root.attrib.get('lines-covered', '0'))
              branches_valid = int(root.attrib.get('branches-valid', '0'))
              branches_covered = int(root.attrib.get('branches-covered', '0'))

              total_lines += lines_valid
              covered_lines += lines_covered
              total_branches += branches_valid
              covered_branches += branches_covered

              parts = cov_file.replace('\\', '/').split('/')
              project_name = next((p for p in parts if p.endswith('.Tests')), os.path.basename(os.path.dirname(cov_file)))
              per_project.append((project_name, line_rate * 100, branch_rate * 100, lines_valid))
            except Exception as e:
              print(f'Warning: could not parse {cov_file}: {e}')

          overall_line = (covered_lines / total_lines * 100) if total_lines > 0 else 0
          overall_branch = (covered_branches / total_branches * 100) if total_branches > 0 else 0

          with open(summary_path, 'a', encoding='utf-8') as f:
            f.write(f'\n### Code Coverage\n')
            f.write(f'**Overall:** {overall_line:.1f}% line · {overall_branch:.1f}% branch ({covered_lines}/{total_lines} lines)\n\n')
            f.write('| Project | Line % | Branch % | Lines |\n')
            f.write('|---------|--------|----------|-------|\n')
            for name, line_pct, branch_pct, lines in sorted(per_project):
              f.write(f'| {name} | {line_pct:.1f}% | {branch_pct:.1f}% | {lines} |\n')
          PY
          # TODO(Epic 2): Add coverage thresholds and enforcement

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-reports
          path: '**/coverage.cobertura.xml'

      - name: Record CI duration summary
        if: always()
        shell: bash
        run: |
          mkdir -p artifacts/ci-duration
          now="$(date -u +%s)"
          started="${FC_FULL_CI_STARTED_AT:-$now}"
          duration="$((now - started))"
          cat > artifacts/ci-duration/full-ci-evidence.json <<JSON
          {
            "runs": [
              {
                "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
                "run_id": "${{ github.run_id }}",
                "commit": "${{ github.sha }}",
                "workflow": "CI",
                "lane": "build-and-test",
                "lane_type": "full-ci",
                "duration_seconds": ${duration},
                "conclusion": "${{ job.status }}",
                "blocking": true,
                "protected_branch": ${{ github.ref == 'refs/heads/main' }}
              }
            ]
          }
          JSON
          python3 .github/scripts/ci_governance.py duration-monitor \
            --evidence artifacts/ci-duration/full-ci-evidence.json \
            --output artifacts/ci-duration/full-ci-summary.json \
            --markdown artifacts/ci-duration/full-ci-summary.md
          cat artifacts/ci-duration/full-ci-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload CI duration artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ci-duration-artifacts
          retention-days: 14
          if-no-files-found: error
          path: artifacts/ci-duration/**

  accessibility-visual:
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 1
          persist-credentials: false
          # Root-declared references submodules only; do not use recursive nested submodule checkout.
          submodules: true

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '10.0.300'

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install root npm dependencies
        env:
          HUSKY: 0
        run: npm ci

      - name: Install Playwright workspace dependencies
        working-directory: tests/e2e
        run: npm ci

      - name: Install Chromium browser
        working-directory: tests/e2e
        run: npx playwright install --with-deps chromium

      - name: Build Counter specimen host
        run: dotnet build samples/Counter/Counter.Web/Counter.Web.csproj --configuration Release

      - name: Typecheck Playwright accessibility lane
        working-directory: tests/e2e
        run: npm run typecheck

      - name: Run accessibility, keyboard, media, zoom, and visual specimen gate
        working-directory: tests/e2e
        env:
          CI: true
          ASPNETCORE_ENVIRONMENT: Test
          Hexalith__FrontComposer__Specimens__Enabled: true
        run: npm run test:a11y

      - name: Validate visual baseline governance
        if: always()
        working-directory: tests/e2e
        run: npm run validate:visual-governance

      - name: Validate accessibility artifacts
        if: always()
        working-directory: tests/e2e
        run: npm run validate:a11y-artifacts

      - name: Upload accessibility and visual artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: accessibility-visual-artifacts
          retention-days: 14
          if-no-files-found: error
          path: |
            tests/e2e/playwright-report/**
            tests/e2e/test-results/**
