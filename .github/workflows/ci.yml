name: CI

# REL-2 (2026-07-13): FrontComposer primary CI now delegates to the shared
# reusable Hexalith.Builds `domain-ci.yml`, matching Hexalith.Tenants so every
# Hexalith module shares one CI/CD operating model. FrontComposer-specific gates
# the reusable does not run (Contracts netstandard2.0 isolation, CLI tool smoke,
# Governance, Contract pacts, docs validation, quarantine/duration telemetry, and
# the Playwright a11y/visual lane) are retained as the explicitly-supplemental
# `quality.yml` workflow (PRD NFR-11). commitlint runs in `commitlint.yml`.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    uses: Hexalith/Hexalith.Builds/.github/workflows/domain-ci.yml@main
    with:
      solution: Hexalith.FrontComposer.slnx
      # Enables scripts/pack-release-packages.py + validate-nuget-packages.py +
      # validate-consumer-package-references.py (FR24 AC1 + AC6): proves the 8-package
      # inventory and the Contracts-only vs Shell/UI consumer boundaries before release.
      run-consumer-validation: true
      # Trait-clean Tier 1 projects only. Shell.Tests (Governance/Contract/Quarantined
      # lanes) and SourceTools.Tests (Performance/MutationErrorHandling lanes) need
      # trait filtering the reusable cannot express, so they run in quality.yml.
      unit-test-projects: |
        tests/Hexalith.FrontComposer.Cli.Tests
        tests/Hexalith.FrontComposer.Contracts.Tests
        tests/Hexalith.FrontComposer.Contracts.UI.Tests
        tests/Hexalith.FrontComposer.Mcp.Tests
        tests/Hexalith.FrontComposer.Testing.Tests
