name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          submodules: false

      - name: Initialize build submodules
        uses: Hexalith/Hexalith.Builds/Github/initialize-build@main

      - name: Initialize .NET
        uses: Hexalith/Hexalith.Builds/Github/initialize-dotnet@main
        with:
          global-json-file: global.json

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*
          cache: npm

      - name: Cache NuGet packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('global.json', 'Directory.Packages.props', 'references/Hexalith.Builds/Props/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore Hexalith.FrontComposer.slnx -p:Configuration=Release

      - name: Build
        run: dotnet build Hexalith.FrontComposer.slnx --configuration Release --no-restore

      - name: Run release tests
        env:
          DiffEngine_Disabled: true
        run: dotnet test Hexalith.FrontComposer.slnx --configuration Release --no-build --filter "Category!=Quarantined" --results-directory ./TestResults --logger "trx;LogFileName=release-results.trx"

      - name: Install release tooling
        env:
          HUSKY: 0
        run: npm ci

      - name: Validate package inventory before release
        run: python3 eng/release_evidence.py inventory --root . --expected eng/release-package-inventory.json --output release-evidence/package-inventory.json

      - name: Run semantic-release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

      - name: Upload package artifacts
        if: success()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-packages
          path: |
            nupkgs/*.nupkg
            nupkgs/*.snupkg
          if-no-files-found: warn
