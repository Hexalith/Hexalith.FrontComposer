name: Release

on:
  # NOTE (CR-12-4-D6, round-5): `push: main` removed. Release publication is gated on the
  # workflow_dispatch `release_approver` input; a push event has no path to supply that
  # input, so the owner-approval step always blocked anyway. Keeping the trigger surface
  # to workflow_dispatch only matches the documented governance model in `12-4-...md`
  # (Cheat Sheet → Current workflow state). Continuous main validation runs under the
  # main CI workflow, not this release workflow.
  workflow_dispatch:
    inputs:
      release_owner_approved:
        description: 'Approve release side effects after reviewing sealed readiness evidence'
        type: boolean
        default: false
      release_approver:
        description: 'Named release owner approving publish/tag/release side effects'
        required: true
        type: string
      dry_run:
        description: 'Classify release readiness without NuGet, tag, GitHub Release, or attestation side effects'
        type: boolean
        default: true

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read

env:
  RELEASE_APPROVAL_MECHANISM: ${{ github.event_name == 'workflow_dispatch' && 'workflow_dispatch_input' || '' }}
  RELEASE_APPROVER: ''
  RELEASE_ATTESTATION_FALLBACK_APPROVER: ${{ vars.RELEASE_ATTESTATION_FALLBACK_APPROVER || '' }}
  RELEASE_ATTESTATION_FALLBACK_EXPIRES_AT: ${{ vars.RELEASE_ATTESTATION_FALLBACK_EXPIRES_AT || '' }}
  RELEASE_ATTESTATION_FALLBACK_FINGERPRINTS_SHA256: ${{ vars.RELEASE_ATTESTATION_FALLBACK_FINGERPRINTS_SHA256 || '' }}
  RELEASE_ATTESTATION_STATUS: ${{ vars.ATTESTATION_UNSUPPORTED == 'true' && 'approved-unsupported' || 'attested' }}
  RELEASE_CONCURRENT_SAME_VERSION: 'true'
  # CR-12-4-P135 (round-6): default to dry-run at the workflow-env level so a skipped
  # or failed "Record workflow-dispatch release inputs" step does NOT fail-open to
  # live publish. The explicit input-override step flips this to `'false'` only when
  # the dispatch input deliberately sets `dry_run: false`.
  RELEASE_DRY_RUN: 'true'
  RELEASE_FROM_FORK: ${{ ((github.event.pull_request.head.repo.fork == true) || (github.event.workflow_run.head_repository.fork == true)) && 'true' || 'false' }}
  RELEASE_OWNER_APPROVED: 'false'

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write # For tag creation and GitHub Release
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0 # semantic-release needs full history
          persist-credentials: false
          submodules: true

      - name: Require bootstrap tag before first release
        shell: bash
        run: |
          if [ -n "$(git tag --list 'v*')" ]; then
            exit 0
          fi

          {
            echo '## Release bootstrap required'
            echo
            echo 'No semantic-release baseline tag was found.'
            echo 'Create `v0.0.0` on the commit immediately before this first release commit, push the tag, then re-run this workflow.'
          } >> "$GITHUB_STEP_SUMMARY"

          exit 1

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '10.0.300'

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Cache NuGet packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('Directory.Packages.props') }}
          restore-keys: nuget-

      - name: Restore
        run: dotnet restore Hexalith.FrontComposer.slnx

      - name: Run All Tests
        env:
          DiffEngine_Disabled: true
        run: dotnet test Hexalith.FrontComposer.slnx --configuration Release --filter "Category!=Quarantined" --results-directory ./TestResults --logger "trx;LogFileName=release-results.trx"

      - name: Verify release test evidence
        run: python3 eng/release_evidence.py test-results --results-dir ./TestResults --output release-evidence/test-results.json

      - name: Install semantic-release
        env:
          HUSKY: 0
        run: npm ci

      - name: Install CycloneDX .NET tool
        run: dotnet tool install --global CycloneDX --version 5.*

      - name: Preflight package inventory
        run: python3 eng/release_evidence.py inventory --root . --expected eng/release-package-inventory.json --output release-evidence/package-inventory-preflight.json

      - name: Start release budget timer
        run: echo "RELEASE_STARTED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Record workflow-dispatch release inputs
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          INPUT_RELEASE_OWNER_APPROVED: ${{ inputs.release_owner_approved }}
          INPUT_RELEASE_APPROVER: ${{ inputs.release_approver }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
        # CR-12-4-P96 (round-5): use GitHub Actions `name<<DELIM` heredoc form for the
        # free-form `release_approver` input so an approver value containing a literal
        # newline cannot inject additional `$GITHUB_ENV` assignments.
        # CR-12-4-P126 (round-6): replace the 15-bit `$RANDOM`-derived delim with a
        # 128-bit `openssl rand -hex 16` value so a workflow_dispatch caller cannot
        # brute-force the delim (1/32768 collision per submission with the previous
        # form). Falls back to a /dev/urandom-derived value if `openssl` is missing.
        run: |
          random_hex="$(openssl rand -hex 16 2>/dev/null || head -c 16 /dev/urandom | xxd -p -c 32)"
          delim="__EOF_RELEASE_APPROVER_${random_hex}__"
          {
            printf 'RELEASE_OWNER_APPROVED=%s\n' "$INPUT_RELEASE_OWNER_APPROVED"
            printf 'RELEASE_APPROVER<<%s\n' "$delim"
            printf '%s\n' "$INPUT_RELEASE_APPROVER"
            printf '%s\n' "$delim"
            printf 'RELEASE_DRY_RUN=%s\n' "$INPUT_DRY_RUN"
          } >> "$GITHUB_ENV"

      - name: Record release concurrency guard
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CURRENT_HEAD_SHA: ${{ github.sha }}
          CURRENT_BRANCH: ${{ github.ref_name }}
        # CR-12-4-P90/P91/P99 (round-5):
        # P90 — `gh api --paginate ... --jq '[expr]'` concatenates one JSON array per page,
        #       which is not valid JSON; drop `--jq` and aggregate pages in Python via a
        #       streaming JSONDecoder so all pages are collected.
        # P91 — replace `|| echo '[]'` (fail-open on gh outage) with explicit capture of
        #       gh exit codes; when the probe fails, fail closed by classifying the run as
        #       concurrent-same-version and emit a diagnostic in the typed payload + step
        #       summary so release owners see the degraded mode.
        # P99 — supplement the head_sha match with a branch-based fallback: any other
        #       release run on the same head_branch is recorded as same_version because
        #       semantic-release on the same branch will typically produce the same tag.
        # CR-12-4-P134 (round-6): write paginated `gh api` output to temp FILES rather
        # than capture into shell vars. Linux `execve(2)` env-var size limit (~128 KiB
        # per var) silently truncated the env-passed body in busy repos, which fed a
        # parse error into the JSONDecoder.raw_decode path and (correctly) failed
        # closed — but blocked every release in busy repos. File-based handoff lets
        # arbitrary stream sizes flow through.
        run: |
          set -euo pipefail
          mkdir -p release-evidence
          runs_file=release-evidence/.concurrency-in-progress.json
          queued_file=release-evidence/.concurrency-queued.json
          set +e
          gh api --paginate "repos/${GITHUB_REPOSITORY}/actions/runs?status=in_progress&per_page=100" \
            >"$runs_file" 2>release-evidence/.concurrency-in-progress-stderr.txt
          in_progress_rc=$?
          gh api --paginate "repos/${GITHUB_REPOSITORY}/actions/runs?status=queued&per_page=100" \
            >"$queued_file" 2>release-evidence/.concurrency-queued-stderr.txt
          queued_rc=$?
          set -e
          guard_json="$(
            RUNS_FILE="$runs_file" \
            QUEUED_FILE="$queued_file" \
            IN_PROGRESS_RC="$in_progress_rc" \
            QUEUED_RC="$queued_rc" \
            python3 - <<'PY'
          import json
          import os

          def load_pages(path_env):
              """Parse a stream produced by `gh api --paginate` into a flat list of runs.

              `gh api --paginate` emits one JSON object per page concatenated without a
              delimiter. We walk the stream with `JSONDecoder.raw_decode` to recover each
              page, then flatten `workflow_runs`. Returns `None` on parse failure so the
              caller can fail closed.
              """
              path = os.environ.get(path_env, "")
              if not path or not os.path.isfile(path):
                  return []
              try:
                  with open(path, "r", encoding="utf-8") as fh:
                      raw = fh.read().strip()
              except OSError:
                  return None
              if not raw:
                  return []
              decoder = json.JSONDecoder()
              pages = []
              idx = 0
              while idx < len(raw):
                  try:
                      obj, end = decoder.raw_decode(raw, idx)
                  except json.JSONDecodeError:
                      return None
                  pages.append(obj)
                  idx = end
                  while idx < len(raw) and raw[idx] in " \r\n\t":
                      idx += 1
              runs = []
              for page in pages:
                  if isinstance(page, dict):
                      runs.extend(page.get("workflow_runs", []) or [])
                  elif isinstance(page, list):
                      runs.extend(page)
              return runs

          probe_diagnostics = []
          if os.environ.get("IN_PROGRESS_RC", "0") != "0":
              probe_diagnostics.append("gh api in_progress probe exited non-zero; failing closed")
          if os.environ.get("QUEUED_RC", "0") != "0":
              probe_diagnostics.append("gh api queued probe exited non-zero; failing closed")
          # CR-12-4-P133 (round-6): if current_branch is empty (future tag-dispatch
          # or detached-ref context), the head_branch fallback cannot fire. Fail
          # closed by recording the gap and forcing the same-version signal `true`.
          if not str(os.environ.get("CURRENT_BRANCH", "")).strip():
              probe_diagnostics.append("CURRENT_BRANCH is empty; head_branch concurrency fallback disabled — failing closed")

          runs_pages = load_pages("RUNS_FILE")
          queued_pages = load_pages("QUEUED_FILE")
          if runs_pages is None:
              probe_diagnostics.append("in_progress runs: failed to parse paginated gh api stream")
              runs_pages = []
          if queued_pages is None:
              probe_diagnostics.append("queued runs: failed to parse paginated gh api stream")
              queued_pages = []

          runs = runs_pages + queued_pages
          current_id = str(os.environ.get("GITHUB_RUN_ID", ""))
          current_sha = str(os.environ.get("CURRENT_HEAD_SHA", ""))
          current_branch = str(os.environ.get("CURRENT_BRANCH", ""))
          same_version = []
          other_release = []
          for run in runs:
              if not isinstance(run, dict):
                  continue
              if str(run.get("id", "")) == current_id:
                  continue
              path = str(run.get("path", ""))
              if not path.endswith(".github/workflows/release.yml"):
                  continue
              entry = {
                  "id": run.get("id"),
                  "status": run.get("status"),
                  "head_sha": run.get("head_sha"),
                  "head_branch": run.get("head_branch"),
                  "run_attempt": run.get("run_attempt"),
              }
              run_sha = str(run.get("head_sha", ""))
              run_branch = str(run.get("head_branch", ""))
              if current_sha and run_sha == current_sha:
                  same_version.append(entry)
              elif current_branch and run_branch == current_branch:
                  # P99: same branch likely targets the same semantic-release tag
                  same_version.append(entry)
              else:
                  other_release.append(entry)

          if probe_diagnostics:
              status = "true"  # P91: fail closed when probe is degraded
          else:
              status = "true" if same_version else "false"

          guard = {
              "status": status,
              "same_version_runs": same_version,
              "other_release_runs": other_release,
              "probe_diagnostics": probe_diagnostics,
          }
          print(json.dumps(guard, separators=(",", ":"), sort_keys=True))
          PY
          )"
          status="$(printf '%s' "$guard_json" | python3 -c 'import json,sys; print(json.load(sys.stdin)["status"])')"
          echo "RELEASE_CONCURRENT_SAME_VERSION=$status" >> "$GITHUB_ENV"
          printf '%s\n' "$guard_json" > release-evidence/concurrency-guard.json
          rm -f release-evidence/.concurrency-in-progress-stderr.txt release-evidence/.concurrency-queued-stderr.txt \
                release-evidence/.concurrency-in-progress.json release-evidence/.concurrency-queued.json
          {
            echo '## Release concurrency guard'
            echo
            echo "Same-version concurrency signal: \`$status\`"
            echo 'Workflow concurrency group `release` is serialized with `cancel-in-progress: false`; reruns and same-version attempts are blocked separately by typed readiness classification.'
            echo 'Same-version match keys on identical `head_sha` OR identical `head_branch` (P99 fallback); other in-flight release runs are recorded for audit but do not set the blocking signal.'
            echo 'gh api probe failures fail closed (signal forced to `true`) and surface in `probe_diagnostics`.'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Require governed attestation fallback before publish
        if: ${{ vars.ATTESTATION_UNSUPPORTED != 'true' }}
        run: |
          {
            echo '## Release attestation mode required'
            echo
            echo 'Set ATTESTATION_UNSUPPORTED=true only after approving the unsupported-attestation fallback, or wire pre-publish attestations into the sealed manifest before release.'
          } >> "$GITHUB_STEP_SUMMARY"
          exit 1

      - name: Record approved attestation fallback before publish
        if: ${{ vars.ATTESTATION_UNSUPPORTED == 'true' }}
        run: |
          mkdir -p release-evidence
          cat > release-evidence/attestation-unavailable.md <<'NOTE'
          # Artifact Attestation Unavailable

          GitHub artifact/SBOM attestation is unavailable for this repository plan, visibility, or permission context.
          Checksums, NuGet author signatures, RFC 3161 timestamps, SBOM, commit SHA, tag, run id, and workflow ref remain the blocking provenance evidence.
          NOTE

      - name: Release owner approval gate
        run: |
          if [ "$RELEASE_OWNER_APPROVED" != "true" ] || [ -z "$RELEASE_APPROVER" ]; then
            {
              echo '## Release owner approval required'
              echo
              echo 'A named release owner must approve NuGet publish, tag/changelog push, GitHub Release creation, and attestation or fallback side effects before semantic-release can run.'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Configure git credentials
        run: git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/Hexalith/Hexalith.FrontComposer.git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run semantic-release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
          NUGET_SIGNING_CERTIFICATE_PATH: ${{ secrets.NUGET_SIGNING_CERTIFICATE_PATH }}
          NUGET_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.NUGET_SIGNING_CERTIFICATE_PASSWORD }}
          NUGET_SIGNING_TIMESTAMPER: ${{ vars.NUGET_SIGNING_TIMESTAMPER || 'http://timestamp.digicert.com' }}

      - name: Release budget monitor
        if: always()
        # CR-12-4-P106 (round-5): forward the real `RELEASE_FROM_FORK` value rather than
        # hardcoding "false"; keeps the publish path and budget path consistent if a future
        # trigger change makes fork status meaningful.
        run: python3 eng/release_evidence.py release-budget --evidence release-evidence/release-budget-history.json --append-current --manifest release-evidence/sealed-manifest.json --output release-evidence/release-budget-summary.json --event-name "${{ github.event_name }}" --ref "${{ github.ref }}" --ref-protected "${{ github.ref_protected }}" --from-fork "${{ env.RELEASE_FROM_FORK }}" --tag "${{ github.ref_name }}" --run-id "${{ github.run_id }}" --publish-status "${{ job.status }}"
