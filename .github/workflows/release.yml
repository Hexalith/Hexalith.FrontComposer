name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write # For tag creation and GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0 # semantic-release needs full history
          persist-credentials: false
          submodules: recursive

      - name: Require bootstrap tag before first release
        shell: bash
        run: |
          if [ -n "$(git tag --list 'v*')" ]; then
            exit 0
          fi

          {
            echo '## Release bootstrap required'
            echo
            echo 'No semantic-release baseline tag was found.'
            echo 'Create `v0.0.0` on the commit immediately before this first release commit, push the tag, then re-run this workflow.'
          } >> "$GITHUB_STEP_SUMMARY"

          exit 1

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '10.0.x'

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Cache NuGet packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('Directory.Packages.props') }}
          restore-keys: nuget-

      - name: Restore
        run: dotnet restore Hexalith.FrontComposer.sln

      - name: Run All Tests
        env:
          DiffEngine_Disabled: true
        run: dotnet test Hexalith.FrontComposer.sln --configuration Release --results-directory ./TestResults --logger "trx;LogFileName=release-results.trx"

      # Guard: fail fast if no tests ran (silent exit 0 with 0 tests would still trigger release).
      - name: Verify tests actually ran
        run: find ./TestResults -name 'release-results.trx' -type f | grep -q .

      - name: Install semantic-release
        env:
          HUSKY: 0
        run: npm ci

      - name: Configure git credentials
        run: git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/Hexalith/Hexalith.FrontComposer.git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run semantic-release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
