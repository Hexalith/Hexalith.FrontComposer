name: Release

# REL-2 (2026-07-13): FrontComposer release now delegates to the shared reusable
# Hexalith.Builds `domain-release.yml`, matching Hexalith.Tenants. It runs after CI
# succeeds on main (workflow_run) so the release never duplicates the CI gate and can
# never publish from a commit whose CI failed. The `event == 'push'` guard keeps any
# scheduled/PR CI runs from starting a release. semantic-release still decides from the
# commit history whether a release is warranted, driven by this repo's `.releaserc.json`
# (pack_release_packages.py + dotnet nuget push).
#
# FR24 release evidence (signing, SBOM, checksums, sealed manifest, classify-release,
# evidence assets) is NOT hosted here: the reusable domain-release.yml is a shared @main
# submodule with no evidence hook and must not be edited from this repo. FR24 evidence
# runs in the FrontComposer-owned supplemental `release-evidence.yml` under the G1
# posture (post-publish + next-release fail-closed). The only path to inline pre-publish
# gating (G2) is a separate owner-approved Hexalith.Builds change.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    permissions:
      contents: write
      issues: write
      pull-requests: write
    uses: Hexalith/Hexalith.Builds/.github/workflows/domain-release.yml@main
    with:
      solution: Hexalith.FrontComposer.slnx
      # CI (the upstream workflow_run gate) already tested this exact head; leave
      # test-projects empty so the release path does not duplicate the test compute.
      test-projects: ''
      # FrontComposer ships NuGet packages only — no container images to publish.
    secrets:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
