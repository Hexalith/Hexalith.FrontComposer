name: Release Evidence

# REL-2 / FR24 (2026-07-13): supplemental FrontComposer-owned release evidence gate.
#
# The shared reusable Hexalith.Builds `domain-release.yml` (called from release.yml)
# publishes via semantic-release and exposes NO evidence hook, and it is a @main submodule
# we must not edit. So the FR24 obligations (signed packages, SBOM, checksums, a sealed +
# verified release manifest, classify-release, and evidence assets) live here in a separate
# supplemental workflow — the AC8 escape hatch sanctioned by the 2026-07-09 proposal.
#
# Gating posture G1 (approved 2026-07-13): publish proceeds under the reusable workflow;
# this workflow produces the full evidence bundle over a deterministic re-pack of the
# release inventory, runs classify-release in advisory mode with no publishable pre-gate
# (for the release that just published), and FAILS CLOSED — its core evidence steps (test-results,
# inventory, verify-manifest, classify-release) are real gating steps, so a missing/invalid
# manifest fails this workflow and blocks confidence in the next release. G2 (an inline
# pre-publish gate upstreamed into Hexalith.Builds domain-release.yml) is a separate
# owner-approved dependency, not implemented in this repo. No workflow_dispatch / dry-run /
# approval gating is reintroduced.
on:
  # REL-2 code-review P1 (2026-07-13): keyed off the RELEASE workflow's completion, NOT CI.
  # release.yml (delegating to the reusable domain-release.yml) runs semantic-release on a
  # push-derived CI success, so by the time Release completes the git tag AND GitHub Release
  # exist — the evidence bundle can bind + upload to the release it documents. Keying off CI
  # raced the concurrent release job and never found the tag. Immutable releases cannot accept
  # post-publication assets, so their bundle remains in the checksummed Actions artifact; mutable
  # releases also receive the JSON assets. NOTE: workflow_run -> workflow_run
  # chaining is GitHub-Actions-authoritative; confirm the first real release fires this (REL-AI-1).
  workflow_run:
    workflows: [Release]
    types: [completed]
    branches: [main]

concurrency:
  group: release-evidence-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release-evidence:
    # release.yml already guards `event == 'push'`, so any successful Release completion is
    # push-derived — gate only on the upstream Release run having succeeded.
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: write
      # FR24 AC9: attest-build-provenance mints an OIDC token (id-token) and uploads a signed
      # provenance attestation (attestations) over the re-packed release artifacts.
      attestations: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Build/pack/sign the exact commit CI validated and semantic-release published from,
          # not whatever main has advanced to since (e.g. the chore(release) commit).
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
          # Root-declared references submodules only; no recursive nested submodule checkout.
          submodules: false

      - name: Initialize build submodules
        uses: Hexalith/Hexalith.Builds/Github/initialize-build@main

      - name: Initialize .NET
        uses: Hexalith/Hexalith.Builds/Github/initialize-dotnet@main
        with:
          global-json-file: global.json

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*
          cache: npm

      - name: Cache NuGet packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('global.json', 'Directory.Packages.props', 'references/Hexalith.Builds/Props/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      # Seed release evidence so the final upload never produces an empty forensic artifact
      # even if a later step fails.
      - name: Seed release evidence directory
        if: always()
        env:
          RUN_META_EVENT_NAME: ${{ github.event.workflow_run.event }}
          RUN_META_REF: ${{ github.ref }}
          RUN_META_RUN_ID: ${{ github.run_id }}
          RUN_META_RUN_ATTEMPT: ${{ github.run_attempt }}
          RUN_META_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          mkdir -p release-evidence
          python3 - <<'PYEOF'
          import json, os
          metadata = {
              "decision_contract": "frontcomposer.release-run-metadata.v1",
              "event_name": os.environ.get("RUN_META_EVENT_NAME", ""),
              "ref": os.environ.get("RUN_META_REF", ""),
              "run_id": os.environ.get("RUN_META_RUN_ID", ""),
              "run_attempt": os.environ.get("RUN_META_RUN_ATTEMPT", ""),
              "sha": os.environ.get("RUN_META_SHA", ""),
          }
          with open("release-evidence/run-metadata.json", "w", encoding="utf-8", newline="\n") as fh:
              json.dump(metadata, fh, sort_keys=True, separators=(",", ":"))
              fh.write("\n")
          PYEOF

      # Resolve the tag/version the Release workflow just published for this commit. semantic-release
      # (@semantic-release/git, per .releaserc.json) tags the `chore(release)` commit whose first
      # PARENT is the released head_sha — so a plain `--points-at head_sha` finds nothing. Match the
      # tag whose commit IS head_sha (no git-plugin) OR whose first parent IS head_sha. If none,
      # semantic-release published no version this run, and every evidence step below no-ops (each is
      # guarded on `tag != ''`), so the workflow is a clean green no-op — not a false failure.
      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          set -uo pipefail
          if ! git fetch --tags --force origin >/dev/null 2>&1; then
            echo "::notice::tag fetch skipped (tags already present or origin unreachable)."
          fi
          head_sha="${{ github.event.workflow_run.head_sha }}"
          tag=""
          for candidate in $(git tag --list 'v*' --sort=-v:refname); do
            target="$(git rev-list -n1 "$candidate" 2>/dev/null)" || continue
            if [ "$target" = "$head_sha" ]; then tag="$candidate"; break; fi
            parents="$(git rev-list --parents -n1 "$target" 2>/dev/null | cut -d' ' -f2-)"
            case " $parents " in *" $head_sha "*) tag="$candidate"; break ;; esac
          done
          if [ -z "$tag" ]; then
            echo "No release tag corresponds to this commit; semantic-release published no version this run." >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Install npm dependencies
        if: ${{ steps.tag.outputs.tag != '' }}
        env:
          HUSKY: 0
        run: npm ci

      - name: Build Contracts test prerequisite (netstandard2.0)
        if: ${{ steps.tag.outputs.tag != '' }}
        run: |
          dotnet restore Hexalith.FrontComposer.slnx -p:Configuration=Release
          dotnet build src/Hexalith.FrontComposer.Contracts/Hexalith.FrontComposer.Contracts.csproj -f netstandard2.0 --configuration Release --no-restore -m:1 /nr:false

      - name: Build solution
        if: ${{ steps.tag.outputs.tag != '' }}
        run: dotnet build Hexalith.FrontComposer.slnx --configuration Release --no-restore

      - name: Run release tests
        if: ${{ steps.tag.outputs.tag != '' }}
        shell: bash
        env:
          DiffEngine_Disabled: true
          TEST_PROJECTS: |
            tests/Hexalith.FrontComposer.Cli.Tests/Hexalith.FrontComposer.Cli.Tests.csproj
            tests/Hexalith.FrontComposer.Contracts.Tests/Hexalith.FrontComposer.Contracts.Tests.csproj
            tests/Hexalith.FrontComposer.Contracts.UI.Tests/Hexalith.FrontComposer.Contracts.UI.Tests.csproj
            tests/Hexalith.FrontComposer.Mcp.Tests/Hexalith.FrontComposer.Mcp.Tests.csproj
            tests/Hexalith.FrontComposer.Shell.Tests/Hexalith.FrontComposer.Shell.Tests.csproj
            tests/Hexalith.FrontComposer.SourceTools.Tests/Hexalith.FrontComposer.SourceTools.Tests.csproj
            tests/Hexalith.FrontComposer.Testing.Tests/Hexalith.FrontComposer.Testing.Tests.csproj
        run: |
          set -euo pipefail
          while IFS= read -r project; do
            [ -z "$project" ] && continue
            name="$(basename "$project" .csproj)"
            dotnet test "$project" --configuration Release --no-build \
              --filter "Category!=Quarantined" \
              --results-directory "./TestResults/$name" \
              --logger "trx;LogFileName=${name}.trx"
          done <<< "$TEST_PROJECTS"

      # Record test-evidence for the released commit: a failed/skipped lane is captured in the FR24
      # bundle. G1 fail-closed (no best-effort suppression) — missing/invalid test evidence fails
      # the job. Gated on a resolved tag so a non-releasing run (where `Run release tests` correctly
      # did not run) does NOT fail on a legitimately-absent ./TestResults.
      - name: Record release test evidence
        if: ${{ steps.tag.outputs.tag != '' }}
        run: python3 eng/release_evidence.py test-results --results-dir ./TestResults --output release-evidence/test-results.json

      - name: Install CycloneDX .NET tool
        if: ${{ steps.tag.outputs.tag != '' }}
        run: dotnet tool install --global CycloneDX --version 5.*

      - name: Re-pack release inventory for evidence
        if: ${{ steps.tag.outputs.tag != '' }}
        shell: bash
        run: |
          set -euo pipefail
          rm -rf ./nupkgs
          # Positional CI-time packer over the single-source-of-truth inventory (packable==true).
          python3 scripts/pack-release-packages.py ./nupkgs "${{ steps.tag.outputs.version }}"

      - name: Validate package inventory
        if: ${{ steps.tag.outputs.tag != '' }}
        run: python3 eng/release_evidence.py inventory --root . --expected eng/release-package-inventory.json --output release-evidence/package-inventory.json

      # FR24 AC9: generate + verify a signed build-provenance attestation over the re-packed
      # release artifacts before release readiness is claimed (bound into the evidence bundle).
      - name: Attest release evidence provenance
        if: ${{ steps.tag.outputs.tag != '' }}
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-path: nupkgs/*.nupkg

      - name: Generate SBOM
        if: ${{ steps.tag.outputs.tag != '' }}
        run: |
          set -euo pipefail
          mkdir -p release-evidence
          dotnet CycloneDX Hexalith.FrontComposer.slnx -o release-evidence -fn sbom.json -j

      - name: Sign and verify packages
        if: ${{ steps.tag.outputs.tag != '' }}
        shell: bash
        env:
          SIGNING_CERT_BASE64: ${{ secrets.NUGET_SIGNING_CERTIFICATE_BASE64 }}
          SIGNING_CERT_PASSWORD: ${{ secrets.NUGET_SIGNING_CERTIFICATE_PASSWORD }}
          SIGNING_TIMESTAMPER: ${{ vars.NUGET_SIGNING_TIMESTAMPER || 'http://timestamp.digicert.com' }}
        run: |
          set -euo pipefail
          mkdir -p release-evidence
          if [ -z "${SIGNING_CERT_BASE64:-}" ]; then
            # AC2/AC10 fail-closed readiness reason: unsigned packages are a blocking gap that the
            # Release Owner must clear before v1.0 RC. Recorded (not silently skipped).
            python3 - <<'PYEOF'
          import json
          reason = {
              "decision_contract": "frontcomposer.signing-readiness.v1",
              "signed": False,
              "verified": False,
              "blocking": True,
              "readiness_reason": "signing certificate secret NUGET_SIGNING_CERTIFICATE_BASE64 is not provisioned; packages are unsigned (FR24 AC2 blocking).",
          }
          with open("release-evidence/signing-readiness.json", "w", encoding="utf-8", newline="\n") as fh:
              json.dump(reason, fh, sort_keys=True, separators=(",", ":"))
              fh.write("\n")
          PYEOF
            echo "::warning::FR24 signing certificate not provisioned; packages unsigned. Recorded as a blocking readiness reason."
          else
            cert_path="$(mktemp --suffix=.pfx)"
            printf '%s' "$SIGNING_CERT_BASE64" | base64 -d > "$cert_path"
            # FR24: on Linux, `dotnet nuget sign`/`verify` trust code-signing roots ONLY via the
            # SDK's own fallback bundle (…/trustedroots/codesignctl.pem), not the OS trust store.
            # Recover the issuing CA from the PFX chain and append it BEFORE signing so the chain
            # builds and verification trusts a self-signed / internal-CA evidence root.
            root_pem="$(mktemp --suffix=.pem)"
            # Recover the issuing CA from the PFX chain so it can be trusted before signing. The
            # legacy retry covers PFXs exported with legacy PKCS#12 ciphers; both attempts run as
            # `if` conditions (exempt from set -e), and a PFX exported without its root chain then
            # fails closed on the explicit BEGIN CERTIFICATE guard below — no failure is suppressed.
            if openssl pkcs12 -in "$cert_path" -cacerts -nokeys -passin "pass:${SIGNING_CERT_PASSWORD}" -out "$root_pem" 2>/dev/null; then
              echo "Recovered issuing CA from the signing PFX chain."
            elif openssl pkcs12 -in "$cert_path" -cacerts -nokeys -legacy -passin "pass:${SIGNING_CERT_PASSWORD}" -out "$root_pem" 2>/dev/null; then
              echo "Recovered issuing CA from the signing PFX chain (legacy PKCS#12)."
            fi
            if ! grep -q "BEGIN CERTIFICATE" "$root_pem"; then
              echo "::error::signing PFX does not embed its issuing CA; export it with the root chain (openssl pkcs12 -certfile root.crt) so verification can trust the code-signing root."
              exit 1
            fi
            sdk_version="$(dotnet --version)"
            sdk_base="$(dotnet --list-sdks | awk -v v="$sdk_version" '$1==v{start=index($0,"["); print substr($0,start+1,length($0)-start-1)}')"
            codesign_bundle="${sdk_base}/${sdk_version}/trustedroots/codesignctl.pem"
            if [ ! -f "$codesign_bundle" ]; then
              echo "::error::NuGet code-signing trust bundle not found at ${codesign_bundle}"
              exit 1
            fi
            if [ -w "$codesign_bundle" ]; then
              { printf '\n'; cat "$root_pem"; } >> "$codesign_bundle"
            else
              { printf '\n'; cat "$root_pem"; } | sudo tee -a "$codesign_bundle" >/dev/null
            fi
            # Sign the re-packed .nupkg into nupkgs-signed/ (symbols stay unsigned in nupkgs/),
            # matching the manifest artifact contract in eng/release_evidence.py prepare-manifest.
            mkdir -p nupkgs-signed
            for pkg in nupkgs/*.nupkg; do
              [ -e "$pkg" ] || continue
              cp "$pkg" "nupkgs-signed/$(basename "$pkg")"
            done
            for pkg in nupkgs-signed/*.nupkg; do
              [ -e "$pkg" ] || continue
              dotnet nuget sign "$pkg" \
                --certificate-path "$cert_path" \
                --certificate-password "$SIGNING_CERT_PASSWORD" \
                --timestamper "$SIGNING_TIMESTAMPER" \
                --overwrite
            done
            rm -f "$cert_path" "$root_pem"
            # Author signature + RFC 3161 timestamp verification for every signed package.
            # `-v normal` is required so the per-package `Successfully verified package '…'`
            # confirmation is emitted for parse_signing_verification; the transcript is
            # path-sanitized (verify echoes absolute artifact/SDK paths that would otherwise
            # trip the evidence redaction gate) before it lands under release-evidence/.
            raw_verify="$(mktemp)"
            dotnet nuget verify nupkgs-signed/*.nupkg --all -v normal | tee "$raw_verify"
            sed -E "s#/(home|Users|tmp|var)/[^[:space:]'\"]*#<path>#g" "$raw_verify" > release-evidence/signing-verification.txt
            rm -f "$raw_verify"
            python3 - <<'PYEOF'
          import json
          reason = {
              "decision_contract": "frontcomposer.signing-readiness.v1",
              "signed": True,
              "verified": True,
              "blocking": False,
              "readiness_reason": "packages signed and verified (dotnet nuget verify --all, RFC 3161 timestamp).",
          }
          with open("release-evidence/signing-readiness.json", "w", encoding="utf-8", newline="\n") as fh:
              json.dump(reason, fh, sort_keys=True, separators=(",", ":"))
              fh.write("\n")
          PYEOF
          fi

      # FR24: bind an LLM benchmark summary hash into the sealed manifest (a required manifest
      # field — see eng/release_evidence.py manifest_diagnostics). The release-evidence run has
      # no provider budget, so it produces CANDIDATE evidence offline (no API spend), mirroring
      # nightly.yml's benchmark orchestration. The non-zero budget/run exits are the EXPECTED
      # candidate-evidence path and are handled via `if` (not suppressed), so a genuine tooling
      # error — e.g. an invalid prompt corpus from validate-prompt-set — still fails closed.
      - name: Produce LLM benchmark candidate evidence
        if: ${{ steps.tag.outputs.tag != '' }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-evidence artifacts/benchmark
          python3 eng/llm_benchmark.py validate-prompt-set --root . --output artifacts/benchmark/prompt-set.json
          if python3 eng/llm_benchmark.py budget-status --output artifacts/benchmark/budget.json; then
            echo "LLM benchmark budget available."
          else
            echo "LLM benchmark budget not available; recording candidate evidence without provider spend."
          fi
          if python3 eng/llm_benchmark.py run-benchmark --root . --budget-artifact artifacts/benchmark/budget.json --output release-evidence/benchmark-summary.json; then
            echo "LLM benchmark passed."
          else
            echo "LLM benchmark recorded as candidate evidence (budget-blocked / no provider spend)."
          fi

      - name: Record FR24 release evidence bundle
        if: ${{ steps.tag.outputs.tag != '' }}
        env:
          GITHUB_WORKFLOW_REF: ${{ github.workflow_ref }}
        run: |
          set -euo pipefail
          # P2 (2026-07-13, code-review "record-and-proceed"): when signing IS provisioned every
          # evidence step is fail-closed. When it is NOT (the documented default until the Release
          # Owner provisions the cert) the Sign step recorded a blocking signing-readiness reason and
          # did not emit signing-verification.txt; the manifest still SEALS carrying that unsigned
          # status and the run proceeds to classify-release, which records it (G1 advisory-at-publish)
          # instead of the job dying here at prepare-manifest. No blanket error-suppression: a
          # *signed*-release failure is still hard; only the acknowledged-unsigned state is
          # recorded-not-fatal (see require_or_record below).
          if [ -f release-evidence/signing-verification.txt ]; then signed=1; else signed=0; fi
          require_or_record() {
            if "$@"; then return 0; fi
            if [ "$signed" = 1 ]; then
              echo "::error::signed-release evidence step failed: $*"
              exit 1
            fi
            echo "::warning::unsigned release — evidence step reported a blocking readiness reason (recorded, not fatal under G1): $*"
          }
          if [ -f release-evidence/sbom.json ]; then
            sbom_hash="$(sha256sum release-evidence/sbom.json | cut -d' ' -f1)"
          else
            sbom_hash=""
          fi
          if [ -f release-evidence/benchmark-summary.json ]; then
            benchmark_hash="$(sha256sum release-evidence/benchmark-summary.json | cut -d' ' -f1)"
          else
            benchmark_hash=""
          fi
          python3 eng/release_evidence.py checksums \
            --root . \
            --pattern 'nupkgs-signed/*.nupkg' \
            --pattern 'nupkgs/*.nupkg' \
            --pattern 'nupkgs/*.snupkg' \
            --pattern 'release-evidence/sbom.json' \
            --pattern 'release-evidence/test-results.json' \
            --pattern 'release-evidence/package-inventory.json' \
            --pattern 'release-evidence/benchmark-summary.json' \
            --output release-evidence/checksums.json
          require_or_record python3 eng/release_evidence.py prepare-manifest \
            --inventory release-evidence/package-inventory.json \
            --checksums release-evidence/checksums.json \
            --version "${{ steps.tag.outputs.version }}" \
            --tag "${{ steps.tag.outputs.tag }}" \
            --sbom-hash "$sbom_hash" \
            --benchmark-summary-hash "$benchmark_hash" \
            --signing-verification release-evidence/signing-verification.txt \
            --output release-evidence/pre-manifest.json
          python3 eng/release_evidence.py seal-manifest \
            --manifest release-evidence/pre-manifest.json \
            --output release-evidence/sealed-manifest.json
          require_or_record python3 eng/release_evidence.py verify-manifest \
            --manifest release-evidence/sealed-manifest.json \
            --root . \
            --output release-evidence/manifest-verification.json

      # G1: classify-release runs in advisory mode with no publishable pre-gate (for the release
      # that already published), but its exit code gates this workflow so missing/invalid evidence
      # fails closed on this and the next release.
      - name: Classify release readiness
        if: ${{ steps.tag.outputs.tag != '' }}
        env:
          GITHUB_EVENT_NAME: ${{ github.event.workflow_run.event }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_REF_PROTECTED: ${{ github.ref_protected }}
        run: |
          set -euo pipefail
          python3 eng/release_evidence.py classify-release \
            --root . \
            --evidence-root ./release-evidence \
            --manifest ./release-evidence/sealed-manifest.json \
            --test-results ./release-evidence/test-results.json \
            --output ./release-evidence/release-readiness.json \
            --event-name "$GITHUB_EVENT_NAME" \
            --ref "$GITHUB_REF" \
            --ref-protected "${GITHUB_REF_PROTECTED:-false}"

      - name: Summarize release evidence artifacts
        if: always()
        run: |
          {
            echo '## FR24 release evidence artifacts (G1)'
            echo
            if [ -d release-evidence ]; then
              find release-evidence -maxdepth 4 -type f | sort | sed 's#^#- #'
            else
              echo '- release-evidence directory was not created.'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Attach release evidence to GitHub Release
        if: ${{ steps.tag.outputs.tag != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          immutable="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}" --jq '.immutable')"
          case "$immutable" in
            true)
              echo "::notice::GitHub Release ${RELEASE_TAG} is immutable; the checksummed evidence bundle remains available as the Actions artifact uploaded by this run."
              {
                echo '### GitHub Release evidence attachment'
                echo
                echo "- Release \`${RELEASE_TAG}\` is immutable, so GitHub rejects post-publication assets."
                echo "- The checksummed evidence bundle is retained in this run's Actions artifact."
              } >> "$GITHUB_STEP_SUMMARY"
              ;;
            false)
              gh release upload "$RELEASE_TAG" release-evidence/*.json --clobber
              ;;
            *)
              echo "::error::GitHub returned an unsupported immutable value '${immutable}' for ${RELEASE_TAG}."
              exit 1
              ;;
          esac

      - name: Upload release evidence artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-evidence-${{ github.run_id }}-${{ github.run_attempt }}
          path: release-evidence/**
          if-no-files-found: error
          retention-days: 30
