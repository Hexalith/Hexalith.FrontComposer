name: Mutation and Property Nightly

on:
  schedule:
    - cron: '17 2 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mutation-property-${{ github.ref }}
  cancel-in-progress: false

jobs:
  source-tools-mutation:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false
          # Root-declared references submodules only; never initialize nested submodules recursively.
          submodules: false

      - name: Initialize build submodules
        uses: Hexalith/Hexalith.Builds/Github/initialize-build@main

      - uses: Hexalith/Hexalith.Builds/Github/initialize-dotnet@main
        with:
          dotnet-version: '10.0.302'

      - name: Restore tools and packages
        run: |
          dotnet tool restore
          dotnet restore Hexalith.FrontComposer.slnx -p:Configuration=Release

      - name: Build SourceTools tests
        run: dotnet build tests/Hexalith.FrontComposer.SourceTools.Tests/Hexalith.FrontComposer.SourceTools.Tests.csproj --configuration Release --no-restore

      - name: Happy-path mutation segment
        run: dotnet tool run dotnet-stryker --config-file tests/Hexalith.FrontComposer.SourceTools.Tests/Mutation/stryker-happy-path.json --output artifacts/mutation/happy-path

      - name: Error-handling mutation segment
        if: always()
        run: dotnet tool run dotnet-stryker --config-file tests/Hexalith.FrontComposer.SourceTools.Tests/Mutation/stryker-error-handling.json --output artifacts/mutation/error-handling

      - name: Validate mutation reports
        if: always()
        shell: pwsh
        run: ./eng/validate-stryker-reports.ps1

      - name: Mutation Summary
        if: always()
        shell: bash
        run: |
          if [ -f artifacts/mutation/job-summary.md ]; then
            cat artifacts/mutation/job-summary.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload mutation artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mutation-source-tools-artifacts
          retention-days: 14
          if-no-files-found: error
          path: artifacts/mutation/**

  lifecycle-properties:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false
          # Root-level submodules only; never initialize nested submodules recursively.
          submodules: false

      - name: Initialize build submodules
        uses: Hexalith/Hexalith.Builds/Github/initialize-build@main

      - uses: Hexalith/Hexalith.Builds/Github/initialize-dotnet@main
        with:
          dotnet-version: '10.0.302'

      - name: Restore packages
        run: dotnet restore Hexalith.FrontComposer.slnx

      - name: Run high-count lifecycle property suite
        shell: pwsh
        run: ./eng/run-lifecycle-property-suite.ps1 -MaxTest 10000 -ResultsDirectory "TestResults/property-nightly"

      - name: Validate property artifacts
        if: always()
        shell: pwsh
        run: ./eng/validate-property-artifacts.ps1

      - name: Property Summary
        if: always()
        shell: bash
        run: |
          if [ -f artifacts/property/job-summary.md ]; then
            cat artifacts/property/job-summary.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload property artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lifecycle-property-artifacts
          retention-days: 14
          if-no-files-found: error
          path: |
            artifacts/property/**
            TestResults/property-nightly/**
